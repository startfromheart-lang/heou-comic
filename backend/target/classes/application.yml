server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/heou-comic.db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.heou.comic.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: heou-comic-jwt-secret-key-very-long-string-for-security-2024
  expiration: 86400000

logging:
  level:
    com.heou.comic: debug
