# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:./comic_generator.db
spring.datasource.username=
spring.datasource.password=

# Database Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.heou.comicgenerator.entity

# JWT Configuration (HS256 requires at least 256 bits = 32 characters)
jwt.secret=HeouComicGeneratorSecretKey2024ForJwtTokenSigningVeryLongKey
jwt.expiration=86400000

# Logging Configuration
logging.level.com.heou.comicgenerator=DEBUG
logging.level.org.springframework.security=DEBUG

# Encoding Configuration
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true