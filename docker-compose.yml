version: '3.8'

services:
  backend:
    build: ./backend
    container_name: heou-comic-backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped
    
  frontend:
    build: ./frontend
    container_name: heou-comic-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
