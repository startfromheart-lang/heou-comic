server:
  port: 8080

spring:
  application:
    name: heou-comic-backend
  datasource:
    url: jdbc:sqlite:data/heou_comic.db
    driver-class-name: org.sqlite.JDBC
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: heou-comic-secret-key-2024
  expiration: 86400000

# 系统配置
system:
  name: AI漫画生成系统
  version: 1.0.0
